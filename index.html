<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  
  /* Wrapper for buttons outside the grid to maintain column alignment */
  .nav-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 10px;
  }

  .top-nav { margin-bottom: 30px; }
  .bottom-nav { margin-top: 30px; margin-bottom: 50px; }

  .home-nav {
    grid-column: 2 / 10; /* Spans from column 2 to 9 */
  }
  
  .home-button {
    display: block;
    width: 100%;
    padding: 15px;
    background-color: #f8f9fa;
    color: #1a73e8;
    text-align: center;
    text-decoration: none;
    font-weight: 500;
    font-size: 18px;
    border: 2px solid #1a73e8;
    border-radius: 8px;
    transition: all 0.3s ease;
    box-sizing: border-box;
  }
  
  .home-button:hover {
    background-color: #1a73e8;
    color: white;
    box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
  }

  #grid-container {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 10px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Responsive Adjustments */
  @media (max-width: 1024px) {
    .nav-wrapper, #grid-container { grid-template-columns: repeat(5, 1fr); }
    .home-nav { grid-column: 1 / 6; }
  }
  
  @media (max-width: 600px) {
    .nav-wrapper, #grid-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .home-nav { grid-column: 1 / 3; }
  }

  .grid-item {
    border-radius: 8px;
    padding: 15px 5px;
    text-align: center;
    font-size: 20px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 95px;
    border: 1px solid rgba(0,0,0,0.1);
    position: relative;
    box-sizing: border-box;
  }
  
  .grid-item:hover {
    transform: scale(1.4);
    z-index: 100;
    box-shadow: 0 10px 30px currentColor, 0 0 20px currentColor;
    text-shadow: 0 0 12px currentColor;
  }

  .grid-item span {
    font-size: 22px;
    margin-bottom: 8px;
    font-weight: 300;
    display: block;
    line-height: 1;
  }
</style>
</head>
<body>

<div class="nav-wrapper top-nav">
  <div class="home-nav">
    <a href="https://sites.google.com/view/BaziiiRan" class="home-button">Bazi (ii) Ran ΏθΠι</a>
  </div>
</div>

<div id="grid-container"></div>

<div class="nav-wrapper bottom-nav">

    "ϊ╕βέβκύΦ▓", "ϊ╕βέβκϊ╣β", "ϊ╕βέβκϊ╕β", "ϊ╕βέβκϊ╕Β", "ϊ╕βέβκόΙΛ", "ϊ╕βέβκί╖▒", "ϊ╕βέβκί║γ", "ϊ╕βέβκϋ╛δ", "ϊ╕βέβκίμυ", "ϊ╕βέβκύβ╕",
    "ϊ╕ΒέβκύΦ▓", "ϊ╕Βέβκϊ╣β", "ϊ╕Βέβκϊ╕β", "ϊ╕Βέβκϊ╕Β", "ϊ╕ΒέβκόΙΛ", "ϊ╕Βέβκί╖▒", "ϊ╕Βέβκί║γ", "ϊ╕Βέβκϋ╛δ", "ϊ╕Βέβκίμυ", "ϊ╕Βέβκύβ╕",

    "ί║γέβκύΦ▓", "ί║γέβκϊ╣β", "ί║γέβκϊ╕β", "ί║γέβκϊ╕Β", "ί║γέβκόΙΛ", "ί║γέβκί╖▒", "ί║γέβκί║γ", "ί║γέβκϋ╛δ", "ί║γέβκίμυ", "ί║γέβκύβ╕",
    "ϋ╛δέβκύΦ▓", "ϋ╛δέβκϊ╣β", "ϋ╛δέβκϊ╕β", "ϋ╛δέβκϊ╕Β", "ϋ╛δέβκόΙΛ", "ϋ╛δέβκί╖▒", "ϋ╛δέβκί║γ", "ϋ╛δέβκϋ╛δ", "ϋ╛δέβκίμυ", "ϋ╛δέβκύβ╕",

  ];

  const container = document.getElementById('grid-container');
  const baseUrl = "https://sites.google.com/view/BaziiiRan";

  function getColorScheme(num) {
    let scheme;
    if (num <= 10) scheme = { bg: "#2B5D34", text: "#0CDD08" };
    else if (num <= 20) scheme = { bg: "#0CDD08", text: "#2B5D34" };
    else if (num <= 30) scheme = { bg: "#c10000", text: "#fc6a03" };
    else if (num <= 40) scheme = { bg: "#fc6a03", text: "#c10000" };
    else if (num <= 50) scheme = { bg: "#FFE302", text: "#CA853C" };
    else if (num <= 60) scheme = { bg: "#CA853C", text: "#FFE302" };
    else if (num <= 70) scheme = { bg: "#ffffff", text: "#999999" };
    else if (num <= 80) scheme = { bg: "#999999", text: "#ffffff" };
    else if (num <= 90) scheme = { bg: "#00BFFF", text: "#000073" };
    else scheme = { bg: "#000073", text: "#00BFFF" };

    scheme.numColor = (num >= 61 && num <= 70) ? scheme.text : "#ffffff";
    return scheme;
  }

  labels.forEach((label, index) => {
    const displayNum = index + 1;
    const siteNum = displayNum.toString().padStart(3, '0');
    const colors = getColorScheme(displayNum);
    
    const div = document.createElement('div');
    div.className = 'grid-item';
    div.style.backgroundColor = colors.bg;
    div.style.color = colors.text;
    
    div.innerHTML = `<span style="color: ${colors.numColor}">${displayNum}</span>${label}`;
    
    div.onclick = () => {
      window.open(baseUrl + siteNum, '_blank');
    };
    
    container.appendChild(div);
  });
</script>
